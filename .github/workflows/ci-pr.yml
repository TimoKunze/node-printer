name: CI for Pull Requests
permissions:
  contents: read
  
on:
  pull_request:

jobs:
  prebuild:
    name: Prebuild Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        arch: [x64]
        node: [22.x, 23.x, 24.x, 25.x, 26.x]
        exclude:
          - os: windows-latest
            node: 23.x
    timeout-minutes: 30
    steps:
      - if: ${{ matrix.os == 'ubuntu-latest' }}
        name: Setup Dependencies
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y g++-multilib gcc-multilib libcups2-dev linux-libc-dev
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/checkout@v5
      # --ignore-scripts skips the package's own install-time `node-gyp rebuild`,
      # which would otherwise compile against unpatched nan before apply-patches
      # runs and fail on V8 >= 14.8. The prebuild step below compiles fresh.
      - run: npm i --ignore-scripts
      - name: Prebuild
        run: |
          npm run apply-patches
          npm run prebuild -- --strip --arch ${{ matrix.arch }}
